name: Release APK

# Build a signed release APK and publish it as a GitHub Release whenever a
# version tag is pushed. The in-app updater (lib/core/update) reads the latest
# release's tag + attached .apk + body, so the tag must match pubspec's version
# (e.g. pubspec `version: 1.1.0+3`  ->  push tag `v1.1.0`).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Recreate the release keystore + key.properties from repo secrets so the
      # APK is signed with the SAME key as every other release (Android refuses
      # to update over an app signed with a different key).
      - name: Configure signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
